<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Strategic Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --success: #10b981;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    /* Навигация */
    .mode-tabs {
      display: flex; gap: 10px; margin-bottom: 25px;
      background: var(--card-bg); padding: 6px; border-radius: 12px; border: 1px solid #334155;
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      border-radius: 8px; font-weight: 600; transition: 0.3s; color: var(--text-dim);
    }
    .tab.active { background: var(--primary); color: white; }

    .mode-section { display: none; }
    .mode-section.active { display: block; }

    /* Поиск и ввод */
    input[type="text"], input[type="number"] {
      width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155;
      color: white; border-radius: 10px; outline: none; font-size: 14px;
    }
    input[type="text"]:focus { border-color: var(--primary); }

    .search-section { position: relative; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1e293b; border: 1px solid #475569; border-radius: 10px;
      margin-top: 8px; max-height: 300px; overflow-y: auto; z-index: 100; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
    }
    .uni-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 14px; }
    .uni-item:hover { background: #2d3748; }

    .params-container { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid #334155; }
    .params-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .param-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }

    .btn-calc {
      width: 100%; padding: 16px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }

    /* Панель результатов */
    .uni-card {
      background: var(--card-bg); border-radius: 20px; padding: 30px;
      border: 1px solid #334155; display: none; margin-top: 25px;
    }
    
    .chart-grid {
      display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; margin-top: 20px; align-items: center;
    }
    @media (max-width: 850px) { .chart-grid { grid-template-columns: 1fr; } }

    .chart-container { position: relative; height: 350px; }

    /* AI Карточки */
    .summary-box { margin-top: 40px; }
    .ai-label { 
        font-weight: 800; color: var(--accent); font-size: 12px; 
        text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px;
        display: flex; align-items: center; gap: 10px;
    }
    .ai-label::after { content: ""; flex: 1; height: 1px; background: #334155; }
    
    .recommendations-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    @media (max-width: 900px) { .recommendations-grid { grid-template-columns: 1fr; } }

    .rec-card {
      background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.4));
      border: 1px solid #334155; padding: 20px; border-radius: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .rec-card:nth-child(1) { border-top: 3px solid var(--primary); }
    .rec-card:nth-child(2) { border-top: 3px solid var(--success); }
    .rec-card:nth-child(3) { border-top: 3px solid var(--accent); }

    .rec-title { color: #fff; font-weight: 700; font-size: 16px; line-height: 1.3; }
    .rec-text { font-size: 13px; line-height: 1.6; color: var(--text-dim); }
    .rec-badge { 
        font-size: 10px; font-weight: 700; text-transform: uppercase; 
        padding: 4px 8px; border-radius: 4px; background: rgba(99, 102, 241, 0.1);
        color: var(--primary); align-self: flex-start;
    }

    .metric-row {
      display: grid; grid-template-columns: 130px 1fr 50px; align-items: center; gap: 15px; margin-bottom: 12px;
    }
    .progress-bg { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

    .loader { color: var(--text-dim); font-size: 14px; padding: 20px; text-align: center; width: 100%; }
  </style>
</head>
<body>

<div class="container">
  <div class="mode-tabs">
    <div class="tab active" onclick="switchMode('search')">Анализ ВУЗа</div>
    <div class="tab" onclick="switchMode('custom')">Ввести данные</div>
  </div>

  <div id="sectionSearch" class="mode-section active">
    <div class="search-section">
      <input type="text" id="uniSearch" placeholder="Введите название университета или ИНН...">
      <div id="autocompleteList" class="autocomplete-list" style="display:none"></div>
    </div>
  </div>

  <div id="sectionCustom" class="mode-section">
    <div class="params-container">
      <div class="params-grid" id="paramsGrid"></div>
      <button class="btn-calc" onclick="sendCustomParams()">Запустить расчет</button>
    </div>
  </div>

  <div id="uniDashboard" class="uni-card">
    <div class="uni-header" style="margin-bottom: 25px;">
      <div id="resName" style="font-size: 24px; color: #fff; font-weight: 800;"></div>
      <div id="resRank" style="color: var(--success); font-size: 14px; font-weight: 600; margin-top: 8px; font-family: monospace;"></div>
    </div>
    
    <div class="chart-grid">
      <div class="chart-container"><canvas id="radarChart"></canvas></div>
      <div id="metricsDisplay"></div>
    </div>

    <div class="summary-box">
      <div class="ai-label">Стратегические меры по улучшению рейтинга</div>
      <div id="aiStatus" class="loader"></div>
      <div id="recommendationsContainer" class="recommendations-grid"></div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://datazavri.vlados.dev";
  const OPENROUTER_KEY = "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";
  let allUnis = [];
  let radarChart = null;

  const labelsMap = { "F1": "Исследования", "F2": "Качество приёма", "F3": "Международность", "F4": "Финансы", "F5": "Акад. глубина" };

  window.onload = async () => {
    const grid = document.getElementById('paramsGrid');
    for (let i = 1; i <= 14; i++) {
      grid.innerHTML += `<div class="param-field"><label>F${i}</label><input type="number" id="f${i}" value="0" step="0.01"></div>`;
    }
    await loadList();
  };

  function switchMode(mode) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (mode === 'search' && i === 0) || (mode === 'custom' && i === 1)));
    document.getElementById('sectionSearch').classList.toggle('active', mode === 'search');
    document.getElementById('sectionCustom').classList.toggle('active', mode === 'custom');
    document.getElementById('uniDashboard').style.display = 'none';
  }

  async function loadList() {
    try {
      const r = await fetch(`${API_URL}/universities`);
      allUnis = await r.json();
    } catch (e) { console.error("Ошибка сети"); }
  }

  const searchInput = document.getElementById('uniSearch');
  const listDiv = document.getElementById('autocompleteList');

  searchInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    listDiv.innerHTML = '';
    if (!val) { listDiv.style.display = 'none'; return; }
    const matches = allUnis.filter(u => (u.university?.NameShort || u.name || "").toLowerCase().includes(val)).slice(0, 8);
    matches.forEach(u => {
      const d = document.createElement('div');
      d.className = 'uni-item';
      d.textContent = u.university?.NameShort || u.name;
      d.onclick = () => selectUni(u);
      listDiv.appendChild(d);
    });
    listDiv.style.display = matches.length ? 'block' : 'none';
  });

  async function selectUni(u) {
    const inn = u.inn || u.university?.INN;
    searchInput.value = u.university?.NameShort || u.name;
    listDiv.style.display = 'none';
    try {
      const res = await fetch(`${API_URL}/post`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ inn: parseFloat(inn) })
      });
      const data = await res.json();
      renderDashboard(data.university, "ТЕКУЩИЙ МОНИТОРИНГ");
    } catch (e) { alert("Ошибка загрузки"); }
  }

  async function sendCustomParams() {
    const params = {};
    for (let i = 1; i <= 14; i++) params[`f${i}`] = parseFloat(document.getElementById(`f${i}`).value) || 0;
    try {
      const res = await fetch(`${API_URL}/forteen`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify([params])
      });
      const data = await res.json();
      const result = Array.isArray(data) ? data[0] : data;
      renderDashboard({
        NameShort: "Прогнозная модель",
        PredictedScore: result.PredictedScore || 0,
        Metrics: result.Metrics || result
      }, "РЕЗУЛЬТАТ СИМУЛЯЦИИ");
    } catch (e) { alert("Ошибка расчета"); }
  }

  async function getAIRecommendations(name, metrics, score) {
    const status = document.getElementById('aiStatus');
    const container = document.getElementById('recommendationsContainer');
    status.innerHTML = '<i>Генерация индивидуального плана развития...</i>';
    container.innerHTML = '';

    const prompt = `Университет: ${name}. Интегральный балл: ${score.toFixed(3)}. 
    Метрики (от -1 до 1.5): Исследования=${metrics.F1}, Приём=${metrics.F2}, Международность=${metrics.F3}, Финансы=${metrics.F4}, Академ. глубина=${metrics.F5}.
    
    Сформируй 3 РАЗНЫХ полноценных меры по улучшению рейтинга. 
    Каждая мера должна содержать: 
    1. Конкретное действие (Заголовок).
    2. Механика (Как это сделать).
    3. Обоснование (Почему это поднимет балл и на какую метрику повлияет).

    Верни ответ СТРОГО в JSON формате:
    {"measures": [{"title": "...", "how": "...", "why": "..."}, {"title": "...", "how": "...", "why": "..."}, {"title": "...", "how": "...", "why": "..."}]}
    Никаких звездочек, только чистый текст.`;

    try {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${OPENROUTER_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          "model": "google/gemini-3-flash-preview",
          "messages": [{ "role": "user", "content": prompt }],
          "response_format": { "type": "json_object" }
        })
      });
      const data = await response.json();
      const aiData = JSON.parse(data.choices[0].message.content);
      
      status.textContent = "";
      aiData.measures.forEach((item, idx) => {
        container.innerHTML += `
          <div class="rec-card">
            <div class="rec-badge">Мера №${idx+1}</div>
            <div class="rec-title">${item.title}</div>
            <div class="rec-text"><strong>Как реализовать:</strong> ${item.how}</div>
            <div class="rec-text"><strong>Влияние на рейтинг:</strong> ${item.why}</div>
          </div>`;
      });
    } catch (e) {
      status.textContent = "Не удалось подключиться к AI-консультанту.";
    }
  }

  function renderDashboard(uni, subtitle) {
    if (!uni) return;
    document.getElementById('uniDashboard').style.display = 'block';
    document.getElementById('resName').textContent = uni.NameShort;
    document.getElementById('resRank').textContent = `${subtitle} • SCORE: ${Number(uni.PredictedScore).toFixed(4)}`;
    
    const metricsKeys = ["F1", "F2", "F3", "F4", "F5"];
    const values = metricsKeys.map(k => uni.Metrics[k] || 0);
    
    updateRadarChart(values);

    const container = document.getElementById('metricsDisplay');
    container.innerHTML = '';
    metricsKeys.forEach((key, idx) => {
      const val = values[idx];
      let p = ((val + 1) / 3) * 100;
      p = Math.min(Math.max(p, 5), 100);
      container.innerHTML += `
        <div class="metric-row">
          <span style="color: var(--text-dim); font-size: 12px; font-weight: 600;">${labelsMap[key]}</span>
          <div class="progress-bg"><div class="progress-fill" style="width: ${p}%"></div></div>
          <span style="color: ${val < 0 ? '#f87171' : 'var(--success)'}; font-size: 12px; font-family: monospace;">${val.toFixed(2)}</span>
        </div>`;
    });

    getAIRecommendations(uni.NameShort, uni.Metrics, uni.PredictedScore);
  }

  function updateRadarChart(values) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    const minVal = Math.min(...values, 0);
    const axisMin = minVal < 0 ? Math.floor(minVal) - 0.2 : 0;

    if (radarChart) radarChart.destroy();

    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ["Исследования", "Приём", "Междунар.", "Финансы", "Академ."],
        datasets: [{
          data: values,
          fill: true,
          backgroundColor: 'rgba(99, 102, 241, 0.2)',
          borderColor: '#6366f1',
          pointBackgroundColor: '#6366f1',
          pointBorderColor: '#fff',
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: '#6366f1',
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            min: axisMin,
            max: Math.max(...values, 1.2),
            grid: { color: 'rgba(71, 85, 105, 0.5)' },
            angleLines: { color: 'rgba(71, 85, 105, 0.5)' },
            pointLabels: { color: '#94a3b8', font: { size: 11, weight: '600' } },
            ticks: { display: false }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-section')) listDiv.style.display = 'none';
  });
</script>

</body>
</html>

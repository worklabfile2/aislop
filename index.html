<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Strategic Analytics | Datazavri</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    .mode-tabs {
      display: flex; gap: 10px; margin-bottom: 25px;
      background: var(--card-bg); padding: 6px; border-radius: 12px; border: 1px solid #334155;
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      border-radius: 8px; font-weight: 600; transition: 0.3s; color: var(--text-dim);
    }
    .tab.active { background: var(--primary); color: white; }

    .mode-section { display: none; }
    .mode-section.active { display: block; }

    input[type="text"] {
      width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155;
      color: white; border-radius: 10px; font-size: 14px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--primary); }

    .search-section { position: relative; margin-bottom: 25px; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1e293b; border: 1px solid #475569; border-radius: 10px;
      margin-top: 8px; max-height: 300px; overflow-y: auto; z-index: 100;
    }
    .uni-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 14px; }
    .uni-item:hover { background: #2d3748; }

    .params-container { background: var(--card-bg); border-radius: 12px; padding: 30px; border: 1px solid #334155; }
    .params-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .param-field {
      background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 20px; transition: all 0.3s;
    }
    .param-field:hover { border-color: var(--primary); background: #1e293b; }

    .param-label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .param-name { font-weight: 700; font-size: 14px; color: white; }

    .tooltip-icon {
      width: 18px; height: 18px; border-radius: 50%; background: var(--primary);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: bold; cursor: help; position: relative;
    }

    .tooltip-icon:hover::after {
      content: attr(data-tooltip); position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%);
      background: #0f172a; color: var(--text-main); padding: 10px; border-radius: 8px;
      border: 1px solid var(--primary); font-size: 12px; z-index: 1000; width: 180px; text-align: center;
    }

    .range-input {
      width: 100%; height: 6px; border-radius: 3px; background: #334155;
      outline: none; -webkit-appearance: none; margin-bottom: 10px;
    }
    .range-input::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: white; border: 2px solid var(--primary); cursor: pointer;
    }

    .value-badge {
      background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px;
      font-weight: 700; font-size: 13px; min-width: 50px; text-align: center;
    }
    .value-badge.low { background: var(--danger); }
    .value-badge.medium { background: var(--warning); }
    .value-badge.high { background: var(--success); }

    .btn-calc {
      width: 100%; padding: 16px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; font-size: 14px; letter-spacing: 1px; transition: 0.3s;
    }
    .btn-calc:hover { background: var(--accent); transform: translateY(-2px); }

    .uni-card {
      background: var(--card-bg); border-radius: 20px; padding: 30px;
      border: 1px solid #334155; display: none; margin-top: 25px;
    }

    .chart-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; margin-top: 20px; align-items: center; }
    @media (max-width: 850px) { .chart-grid { grid-template-columns: 1fr; } }

    .metric-row { display: grid; grid-template-columns: 130px 1fr 50px; align-items: center; gap: 15px; margin-bottom: 12px; }
    .progress-bg { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; transition: width 1s; }

    .ai-label {
      font-weight: 800; color: var(--accent); font-size: 12px; text-transform: uppercase;
      margin: 40px 0 20px; letter-spacing: 2px; display: flex; align-items: center; gap: 10px;
    }
    .ai-label::after { content: ""; flex: 1; height: 1px; background: #334155; }

    .recommendations-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .rec-card {
      background: rgba(15, 23, 42, 0.4); border: 1px solid #334155; padding: 20px;
      border-radius: 16px; border-top: 3px solid var(--primary);
    }
    .rec-title { color: #fff; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
    .rec-text { font-size: 13px; line-height: 1.6; color: var(--text-dim); }
    .loader { color: var(--text-dim); font-size: 14px; padding: 20px; text-align: center; }
    
    .rank-badge {
      display: inline-block; padding: 4px 12px; background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success); color: var(--success); border-radius: 6px;
      font-size: 13px; font-weight: 700; margin-left: 15px;
    }

    .factors-section { margin-top: 30px; }
    .factors-section-label {
      font-weight: 800; color: var(--text-dim); font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .factors-section-label::after { content: ""; flex: 1; height: 1px; background: #334155; }

    .factors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    @media (max-width: 768px) { .factors-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } }
    @media (max-width: 480px) { .factors-grid { grid-template-columns: 1fr; } }

    .factor-card {
      background: #0a1628; border: 1px solid #334155; border-radius: 12px;
      padding: 18px; border-left: 3px solid var(--primary);
    }
    .factor-card.f1 { border-left-color: #6366f1; }
    .factor-card.f2 { border-left-color: #10b981; }
    .factor-card.f3 { border-left-color: #8b5cf6; }
    .factor-card.f4 { border-left-color: #f59e0b; }
    .factor-card.f5 { border-left-color: #ef4444; }

    .factor-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 14px;
    }
    .factor-label { font-weight: 700; font-size: 12px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }

    .factor-score {
      color: white; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .factor-score.score-low { background: var(--danger); }
    .factor-score.score-mid { background: var(--warning); }
    .factor-score.score-high { background: var(--success); }

    .indicator-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; padding: 7px 0; border-bottom: 1px solid #1a2642; font-size: 13px;
    }
    .indicator-row:last-child { border-bottom: none; }
    .ind-label { color: var(--text-dim); flex: 1; line-height: 1.4; font-size: 12px; }
    .ind-val { font-weight: 700; color: white; white-space: nowrap; font-size: 13px; }
    .ind-unit { font-size: 10px; color: var(--text-dim); font-weight: 400; }
    .no-data { color: #3d4f6b; font-style: italic; font-size: 12px; }

    .country-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; background: rgba(139,92,246,0.15);
      border: 1px solid var(--accent); color: var(--accent); margin-left: 10px; vertical-align: middle;
    }
    .forecast-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; background: rgba(245,158,11,0.15);
      border: 1px solid var(--warning); color: var(--warning); margin-left: 10px; vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="mode-tabs">
    <div class="tab active" id="tabSearch" onclick="switchMode('search')">Анализ ВУЗа</div>
    <div class="tab" id="tabCustom" onclick="switchMode('custom')">Ввести данные</div>
  </div>

  <div id="sectionSearch" class="mode-section active">
    <div class="search-section">
      <input type="text" id="uniSearch" placeholder="Введите название университета или ИНН...">
      <div id="autocompleteList" class="autocomplete-list" style="display:none"></div>
    </div>
  </div>

  <div id="sectionCustom" class="mode-section">
    <div class="params-container">
      <div class="params-grid" id="paramsGrid"></div>
      <button class="btn-calc" onclick="sendCustomParams()">Запустить расчет</button>
    </div>
  </div>

  <div id="uniDashboard" class="uni-card">
    <div class="uni-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap;">
      <div>
        <div id="resName" style="font-size: 28px; color: #fff; font-weight: 800; display: inline-block;"></div>
        <div id="actualRankDisplay" class="rank-badge">МЕСТО В РЕЙТИНГЕ: #0</div>
        <div id="resRank" style="color: var(--text-dim); font-size: 14px; font-weight: 600; margin-top: 8px;"></div>
      </div>
    </div>

    <div class="chart-grid">
      <div style="position: relative; height: 350px;"><canvas id="radarChart"></canvas></div>
      <div id="metricsDisplay"></div>
    </div>

    <div id="factorsContainer" class="factors-section"></div>

    <div class="summary-box">
      <div class="ai-label">Стратегические меры</div>
      <div id="aiStatus" class="loader"></div>
      <div id="recommendationsContainer" class="recommendations-grid"></div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://datazavri.vlados.dev";
  const OPENROUTER_KEY = "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";

  const paramsInfo = {
    f1: { name: "Средний балл ЕГЭ (бюджет)", min: 40, max: 100, hint: "Для бюджетных мест" },
    f2: { name: "Средний балл ЕГЭ (платное)", min: 40, max: 100, hint: "Для платного обучения" },
    f3: { name: "Минимальный проходной балл", min: 30, max: 90, hint: "Нижний порог отбора" },
    f4: { name: "Победители ВсОШ на 100 студ.", min: 0, max: 5, hint: "Олимпиадники ВсОШ" },
    f5: { name: "Победители олимпиад на 100 студ.", min: 0, max: 10, hint: "Все олимпиады" },
    f6: { name: "Доля НИОКР в доходах (%)", min: 0, max: 60, hint: "Наука в бюджете" },
    f7: { name: "Публикации WoS на 100 преп.", min: 0, max: 200, hint: "Международные статьи" },
    f8: { name: "Гранты на 100 преп.", min: 0, max: 50, hint: "Активные гранты" },
    f9: { name: "Доля магистрантов (%)", min: 0, max: 50, hint: "Магистратура" },
    f10: { name: "Доля иностранных преп. (%)", min: 0, max: 20, hint: "Иностранцы в штате" },
    f11: { name: "Внебюджетные доходы (тыс. руб)", min: 0, max: 20000, hint: "Доход на 1 преп." },
    f12: { name: "Доля современного оборудования (%)", min: 0, max: 100, hint: "Техника < 5 лет" },
    f13: { name: "Аспиранты на 100 студ.", min: 0, max: 15, hint: "Аспирантура" },
    f14: { name: "Доля докторов наук (%)", min: 0, max: 30, hint: "Профессорский состав" }
  };

  const labelsMap = { "F1": "Исследования", "F2": "Качество приёма", "F3": "Международность", "F4": "Финансы", "F5": "Акад. глубина" };
  let allUnis = [];
  let radarChart = null;

  window.onload = async () => {
    const grid = document.getElementById('paramsGrid');
    Object.keys(paramsInfo).forEach(key => {
      const info = paramsInfo[key];
      const mid = (info.min + info.max) / 2;
      grid.innerHTML += `
        <div class="param-field">
          <div class="param-label">
            <span class="param-name">${info.name}</span>
            <div class="tooltip-icon" data-tooltip="${info.hint}">?</div>
          </div>
          <input type="range" id="${key}" class="range-input" min="${info.min}" max="${info.max}" value="${mid}" step="0.1" oninput="updateVal('${key}')">
          <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-size:12px; color:var(--text-dim)">Значение:</span>
            <div class="value-badge" id="${key}-badge">${mid.toFixed(1)}</div>
          </div>
        </div>`;
    });
    await loadList();
  };

  function updateVal(id) {
    const val = parseFloat(document.getElementById(id).value);
    const badge = document.getElementById(id + '-badge');
    badge.textContent = val.toFixed(1);
    const range = paramsInfo[id].max - paramsInfo[id].min;
    const norm = (val - paramsInfo[id].min) / range;
    badge.className = 'value-badge ' + (norm < 0.33 ? 'low' : norm < 0.66 ? 'medium' : 'high');
  }

  async function loadList() {
    try {
      const r = await fetch(`${API_URL}/universities`);
      allUnis = await r.json();
    } catch (e) { console.error("Load error"); }
  }

  function switchMode(mode) {
    document.getElementById('sectionSearch').classList.toggle('active', mode === 'search');
    document.getElementById('sectionCustom').classList.toggle('active', mode === 'custom');
    document.getElementById('tabSearch').classList.toggle('active', mode === 'search');
    document.getElementById('tabCustom').classList.toggle('active', mode === 'custom');
  }

  const searchInput = document.getElementById('uniSearch');
  const listDiv = document.getElementById('autocompleteList');

  searchInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    listDiv.innerHTML = '';
    if (!val) { listDiv.style.display = 'none'; return; }
    const matches = allUnis.filter(u => (u.university?.NameShort || u.name || "").toLowerCase().includes(val)).slice(0, 8);
    matches.forEach(u => {
      const d = document.createElement('div');
      d.className = 'uni-item';
      d.textContent = u.university?.NameShort || u.name;
      d.onclick = () => selectUni(u);
      listDiv.appendChild(d);
    });
    listDiv.style.display = matches.length ? 'block' : 'none';
  });

  async function selectUni(u) {
    const inn = u.inn || u.university?.INN;
    searchInput.value = u.university?.NameShort || u.name;
    listDiv.style.display = 'none';
    try {
      const res = await fetch(`${API_URL}/post`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ inn: parseFloat(inn) })
      });
      const data = await res.json();
      renderDashboard(data.university || data, "ТЕКУЩИЙ МОНИТОРИНГ");
    } catch (e) { alert("Ошибка загрузки"); }
  }

  async function sendCustomParams() {
    const params = {};
    for (let i = 1; i <= 14; i++) params[`f${i}`] = parseFloat(document.getElementById(`f${i}`).value);
    try {
      const res = await fetch(`${API_URL}/forteen`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify([params])
      });
      const data = await res.json();
      const result = Array.isArray(data) ? data[0] : data;
      renderDashboard(result, "РЕЗУЛЬТАТ СИМУЛЯЦИИ");
    } catch (e) { alert("Ошибка расчета"); }
  }

  function renderDashboard(uni, subtitle) {
    if (!uni) return;
    document.getElementById('uniDashboard').style.display = 'block';

    // Очищаем предыдущие бейджи страны/прогноза
    document.querySelectorAll('.country-badge, .forecast-badge').forEach(el => el.remove());

    const nameEl = document.getElementById('resName');
    nameEl.textContent = uni.NameShort || uni.name || "Прогнозная модель";

    if (uni.Country === 'BY') nameEl.insertAdjacentHTML('afterend', '<span class="country-badge">Беларусь</span>');
    if (uni.InTraining === false && uni.NameShort) nameEl.insertAdjacentHTML('afterend', '<span class="forecast-badge">Прогнозный рейтинг</span>');

    // Forbes badge — скрыть при нулевом/отсутствующем реальном ранге или симуляции
    const actualRank = uni.ActualRank || uni.actual_rank || 0;
    const rankEl = document.getElementById('actualRankDisplay');
    if (!actualRank || subtitle === "РЕЗУЛЬТАТ СИМУЛЯЦИИ") {
      rankEl.style.display = 'none';
    } else {
      rankEl.textContent = `МЕСТО FORBES: #${actualRank}`;
      rankEl.style.display = 'inline-block';
    }

    const extRank = uni.ExtendedRank || uni.extended_rank;
    const rankLabel = extRank ? ` • #${extRank} из 723` : '';
    const score = uni.ScoreNormalized ?? uni.score_normalized ?? uni.PredictedScore ?? uni.predicted_score ?? uni.score ?? 0;
    document.getElementById('resRank').textContent = `${subtitle}${rankLabel} • БАЛЛ: ${Number(score).toFixed(2)}`;

    const metricsKeys = ["F1", "F2", "F3", "F4", "F5"];
    const values = metricsKeys.map(k => {
      const normKey = k + "Norm";
      if (uni[normKey] !== undefined) return uni[normKey];
      if (uni.Metrics && uni.Metrics[normKey] !== undefined) return uni.Metrics[normKey];
      return (uni.Metrics ? uni.Metrics[k] : uni[k]) || 0;
    });

    updateChart(values);

    const container = document.getElementById('metricsDisplay');
    container.innerHTML = '';
    metricsKeys.forEach((key, idx) => {
      const val = values[idx];
      const color = val <= 3.5 ? '#ef4444' : val <= 6.5 ? '#f59e0b' : '#10b981';
      container.innerHTML += `
        <div class="metric-row">
          <span style="color:var(--text-dim); font-size:12px; font-weight:600;">${labelsMap[key]}</span>
          <div class="progress-bg"><div class="progress-fill" style="width:${val * 10}%; background:${color}"></div></div>
          <span style="color:${color}; font-weight:700; font-size:12px; text-align:right;">${val.toFixed(1)}/10</span>
        </div>`;
    });

    renderFactors(uni);
    getAI(uni.NameShort || uni.name, values, score);
  }

  function renderFactors(uni) {
    const isBY = uni.Country === 'BY';
    const container = document.getElementById('factorsContainer');

    const groups = [
      { key: 'F1', cls: 'f1', label: 'Исследовательская активность', indicators: [
        { key: 'WosPubsPer100', label: 'Публикации WoS на 100 преп.', unit: 'шт/100 НПР' },
        { key: 'RndRevenueShare', label: 'Доля НИОКР в доходах', unit: '%' },
        { key: 'GrantsPer100Fac', label: 'Гранты на 100 преп.', unit: 'шт/100 НПР' },
        { key: 'MasterShare', label: 'Доля магистрантов', unit: '%' },
        { key: 'ForeignFacultyShare', label: 'Доля иностранных преп.', unit: '%' },
      ]},
      { key: 'F2', cls: 'f2', label: 'Качество приёма и престиж', indicators: [
        { key: 'EgeBudget', label: isBY ? 'Средний ЦТ (бюджет)' : 'Средний ЕГЭ (бюджет)', unit: 'баллов' },
        { key: 'EgePaid', label: isBY ? 'Средний ЦТ (платное)' : 'Средний ЕГЭ (платное)', unit: 'баллов' },
        { key: 'EgeMin', label: isBY ? 'Мин. проходной ЦТ' : 'Мин. проходной балл', unit: 'баллов' },
        { key: 'VsoshPer100', label: 'Победители ВсОШ', unit: 'шт/100 студ.' },
        { key: 'OlympPer100', label: 'Победители олимпиад', unit: 'шт/100 студ.' },
      ]},
      { key: 'F3', cls: 'f3', label: 'Международность', indicators: [
        { key: 'ForeignNonCisShare', label: 'Иностранные студенты (не СНГ)', unit: '%' },
        { key: 'ForeignTotalShare', label: 'Иностранные студенты (всего)', unit: '%' },
      ]},
      { key: 'F4', cls: 'f4', label: 'Финансовые ресурсы', indicators: [
        { key: 'RevenuePerFaculty', label: 'Доходы на 1 преподавателя', unit: 'тыс. руб.' },
        { key: 'ModernEquipmentShare', label: 'Доля современного оборудования', unit: '%' },
      ]},
      { key: 'F5', cls: 'f5', label: 'Академическая глубина', indicators: [
        { key: 'PostgradPer100', label: 'Аспиранты на 100 студентов', unit: 'чел/100' },
        { key: 'DoctShare', label: 'Доля докторов наук', unit: '%' },
      ]},
    ];

    const cardsHtml = groups.map(g => {
      const normVal = uni[g.key + 'Norm'];
      const scoreCls = normVal == null ? '' : normVal < 4 ? 'score-low' : normVal < 7 ? 'score-mid' : 'score-high';
      const scoreHtml = normVal != null ? `<span class="factor-score ${scoreCls}">${normVal.toFixed(1)}/10</span>` : '';

      const rows = g.indicators.map(ind => {
        const v = uni[ind.key];
        const display = v == null
          ? `<span class="no-data">нет данных</span>`
          : `<span class="ind-val">${Number.isInteger(v) ? v : v.toFixed(2)} <span class="ind-unit">${ind.unit}</span></span>`;
        return `<div class="indicator-row"><span class="ind-label">${ind.label}</span>${display}</div>`;
      }).join('');

      return `<div class="factor-card ${g.cls}"><div class="factor-header"><span class="factor-label">${g.label}</span>${scoreHtml}</div>${rows}</div>`;
    }).join('');

    container.innerHTML = `<div class="factors-section-label">Детальные показатели</div><div class="factors-grid">${cardsHtml}</div>`;
  }

  function updateChart(values) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    if (radarChart) radarChart.destroy();
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ["F1", "F2", "F3", "F4", "F5"],
        datasets: [{
          data: values,
          backgroundColor: 'rgba(99, 102, 241, 0.2)',
          borderColor: '#6366f1',
          borderWidth: 2,
          pointBackgroundColor: '#fff'
        }]
      },
      options: {
        scales: { r: { min: 0, max: 10, ticks: { display: false }, grid: { color: '#334155' } } },
        plugins: { legend: { display: false } }
      }
    });
  }

  async function getAI(name, metrics, score) {
    const status = document.getElementById('aiStatus');
    const container = document.getElementById('recommendationsContainer');
    status.innerHTML = '<i>ИИ анализирует потенциал...</i>';
    container.innerHTML = '';

    const prompt = `ВУЗ: ${name}. Итоговый балл: ${score}. Метрики (0-10): F1=${metrics[0]}, F2=${metrics[1]}, F3=${metrics[2]}, F4=${metrics[3]}, F5=${metrics[4]}. Дай 3 конкретных совета по улучшению в JSON: {"measures": [{"title": "название", "how": "как внедрить", "why": "результат"}]}`;

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${OPENROUTER_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ "model": "google/gemini-2-flash-lite", "messages": [{ "role": "user", "content": prompt }] })
      });
      const data = await res.json();
      const aiData = JSON.parse(data.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);
      status.innerHTML = "";
      aiData.measures.forEach(m => {
        container.innerHTML += `<div class="rec-card"><div class="rec-title">${m.title}</div><div class="rec-text"><b>Как:</b> ${m.how}</div><div class="rec-text"><b>Итог:</b> ${m.why}</div></div>`;
      });
    } catch (e) { status.textContent = "⚠️ Рекомендации недоступны"; }
  }

  document.addEventListener('click', (e) => { if (!e.target.closest('.search-section')) listDiv.style.display = 'none'; });
</script>

</body>
</html>
